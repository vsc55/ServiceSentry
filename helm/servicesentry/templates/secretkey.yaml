{{- /*
Shared encryption key (.flask_secret), the SAME for every pod so they can all
decrypt the secrets stored in the DB. Precedence: explicit values.secretKey >
an already-deployed key (kept stable across `helm upgrade` via lookup) > a freshly
generated 64-hex-char key (sha256 of a random string).
*/ -}}
{{- $name := printf "%s-secretkey" (include "servicesentry.fullname" .) -}}
{{- $key := .Values.secretKey -}}
{{- if not $key -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- if and $existing $existing.data (index $existing.data "flask_secret") -}}
{{- $key = index $existing.data "flask_secret" | b64dec -}}
{{- else -}}
{{- $key = randAlphaNum 32 | sha256sum -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "servicesentry.labels" . | nindent 4 }}
  annotations:
    # Keep the generated key on upgrades / helm uninstall keep-history.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  flask_secret: {{ $key | quote }}

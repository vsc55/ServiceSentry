{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "servicesentry.fullname" . }}-secret
  labels:
    {{- include "servicesentry.labels" . | nindent 4 }}
type: Opaque
stringData:
  SS_USERNAME: {{ .Values.auth.username | quote }}
  SS_PASSWORD: {{ required "auth.password is required (or set existingSecret)" .Values.auth.password | quote }}
  {{- if ne .Values.database.driver "sqlite" }}
  SS_DB_PASSWORD: {{ required "database.password is required (or set existingSecret)" .Values.database.password | quote }}
  {{- end }}
  {{- if and .Values.syslogDatabase.enabled .Values.syslogDatabase.password }}
  SS_SYSLOG_DB_PASSWORD: {{ .Values.syslogDatabase.password | quote }}
  {{- end }}
  {{- if and .Values.control.enabled .Values.control.token }}
  SS_CONTROL_TOKEN: {{ .Values.control.token | quote }}
  {{- end }}
  {{- with .Values.telegram.token }}
  SS_TELEGRAM_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.telegram.chatId }}
  SS_TELEGRAM_CHAT_ID: {{ . | quote }}
  {{- end }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "servicesentry.fullname" . }}-web
  labels:
    {{- include "servicesentry.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "servicesentry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "servicesentry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "servicesentry.serviceAccountName" . }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "servicesentry.netRaw" . | nindent 10 }}
          envFrom:
            {{- include "servicesentry.envFrom" . | nindent 12 }}
          env:
            - { name: SS_SERVICE_ROLE, value: web }
            - { name: SS_WEB_HOST, value: "0.0.0.0" }
            - { name: SS_WEB_PORT, value: "8080" }
            # The dedicated containers own the services; keep them out of the web
            # process (else schedulers/listeners/workers would run twice).
            - { name: SS_MONITORING_EMBEDDED, value: "0" }
            - { name: SS_SYSLOG_EMBEDDED, value: "0" }
            - { name: SS_EVENTS_EMBEDDED, value: "0" }
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "servicesentry.volumeMounts" . | nindent 12 }}
      volumes:
        {{- include "servicesentry.volumes" . | nindent 8 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "servicesentry.fullname" . }}-web
  labels:
    {{- include "servicesentry.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "servicesentry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      {{- if and (eq .Values.web.service.type "NodePort") .Values.web.service.nodePort }}
      nodePort: {{ .Values.web.service.nodePort }}
      {{- end }}

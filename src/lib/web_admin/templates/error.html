{% extends "base.html" %}

{% block title %}{{ code }} — ServiceSentry{% endblock %}

{# Page styles live in static/css/web_admin.css (loaded by base.html). #}

{% block body %}
<div class="error-wrap">
    <div class="error-card">
        <div class="error-code mb-2">{{ code }}</div>
        <div class="error-icon text-secondary">
            <i class="bi {{ icon }}"></i>
        </div>
        <h1 class="h4 fw-semibold mb-2">{{ title }}</h1>
        <p class="text-secondary mb-0">{{ description }}</p>
    </div>
</div>
{% endblock %}

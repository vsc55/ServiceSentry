{# Navigation bar — top of every dashboard page #}
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-shield-check me-1"></i> ServiceSentry
        </span>
        <div class="d-flex align-items-center">
            {# Switch between the standalone Overview page and the admin panel. #}
            {% if overview_page %}
            <a class="btn btn-light btn-sm me-3" href="/admin">
                <i class="bi bi-sliders me-1"></i>{{ i18n.admin_panel or 'Admin' }}</a>
            {% else %}
            <a class="btn btn-light btn-sm me-3" href="/overview">
                <i class="bi bi-speedometer2 me-1"></i>{{ i18n.tab_overview }}</a>
            {% endif %}
            <div class="dropdown">
                <button class="btn btn-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>{{ display_name }}
                    <span class="badge bg-secondary ms-1">{{ role }}</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="#" onclick="openAccountSettingsModal(); return false;">
                            <i class="bi bi-gear me-2"></i>{{ i18n.my_settings }}
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" href="#" onclick="_logout();return false;">
                            <i class="bi bi-box-arrow-right me-2"></i>{{ i18n.logout }}
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

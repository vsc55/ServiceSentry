<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ServiceSentry — Status</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/status.css" rel="stylesheet">
</head>
<body class="{{ 'st-ok' if overall_ok else 'st-down' }}">

<!-- Dynamic body — refreshed over AJAX (/status?fragment=1), no full page reload. -->
<div id="status-body">
{% include 'partials/status_body.html' %}
</div>

<!-- Connection-lost overlay (auto-hidden when the server answers again) -->
<div id="st-conn-overlay" class="ss-conn-overlay" style="display:none"
     role="alertdialog" aria-live="assertive" aria-modal="true">
  <div class="ss-conn-card">
    <div class="spinner-border mb-3" role="status" style="color:#f59e0b"></div>
    <div class="ss-conn-title">{{ i18n.conn_lost_title }}</div>
    <div class="ss-conn-msg">{{ i18n.conn_lost_msg }}</div>
  </div>
</div>

<script>
const REFRESH_SECS = {{ refresh_secs }};
let remaining = REFRESH_SECS;

// The countdown/fill elements live inside #status-body, so re-query them each tick
// (the AJAX refresh replaces them).
function _stTick() {
    const c = document.getElementById('countdown');
    const f = document.getElementById('refresh-fill');
    if (c) c.textContent = remaining;
    if (f) f.style.width = (remaining / REFRESH_SECS * 100) + '%';
}

function _stSetConnLost(lost) {
    const ov = document.getElementById('st-conn-overlay');
    if (ov) ov.style.display = lost ? 'flex' : 'none';
}

async function _stRefresh() {
    try {
        const r = await fetch('/status?fragment=1', { cache: 'no-store' });
        if (!r.ok) throw new Error('http ' + r.status);
        document.getElementById('status-body').innerHTML = await r.text();
        // Reflect the new overall state on <body> (drives the ok/degraded theming).
        const ok = document.querySelector('#status-body .hero')?.dataset.overallOk === 'true';
        document.body.className = ok ? 'st-ok' : 'st-down';
        _stSetConnLost(false);
    } catch (_) {
        _stSetConnLost(true);   // unreachable → show the overlay, keep the current content
    } finally {
        remaining = REFRESH_SECS;
    }
}

setInterval(() => {
    remaining--;
    _stTick();
    if (remaining <= 0) _stRefresh();
}, 1000);

// The browser's own network state: instant show on a dropped link, re-check on restore.
window.addEventListener('offline', () => _stSetConnLost(true));
window.addEventListener('online', _stRefresh);

// Expand/collapse a module's per-item detail. Uses inline onclick in the markup, so it
// keeps working after each AJAX refresh re-renders the cards.
function toggleMod(name) {
    const hdr  = document.querySelector('#mod-' + name + ' .mod-header');
    const body = document.getElementById('body-' + name);
    if (!hdr || !body) return;
    if (hdr.classList.contains('collapsed')) {
        body.style.display = '';
        hdr.classList.remove('collapsed');
    } else {
        body.style.display = 'none';
        hdr.classList.add('collapsed');
    }
}
</script>
</body>
</html>

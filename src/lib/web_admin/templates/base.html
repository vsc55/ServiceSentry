<!DOCTYPE html>
<html lang="{{ lang }}" data-bs-theme="{{ 'dark' if dark_mode else 'light' }}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ServiceSentry{% endblock %}</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        [data-bs-theme="light"] body {
            background-color: #f5f6fa
        }
        [data-bs-theme="light"] {
            --ss-card-header-bg: #e9ecef;
            --ss-pagination-bg:  #f0f2f5;
        }

        /* ── Deep dark theme (Plex-inspired) ───────────────────────── */
        [data-bs-theme="dark"] {
            --bs-body-bg:                   #181818;
            --bs-body-bg-rgb:               24, 24, 24;
            --bs-body-color:                #d4d4d4;
            --bs-body-color-rgb:            212, 212, 212;
            --bs-emphasis-color:            #f0f0f0;
            --bs-emphasis-color-rgb:        240, 240, 240;
            --bs-secondary-bg:              #212121;
            --bs-secondary-bg-rgb:          33, 33, 33;
            --bs-tertiary-bg:               #2a2a2a;
            --bs-tertiary-bg-rgb:           42, 42, 42;
            --bs-secondary-color:           rgba(180,180,180,.75);
            --bs-tertiary-color:            rgba(155,155,155,.50);
            --bs-border-color:              rgba(255,255,255,.09);
            --bs-border-color-translucent:  rgba(255,255,255,.06);
            /* subtle tinted backgrounds used by hint panels and alerts */
            --bs-info-bg-subtle:            rgba(13,202,240,.07);
            --bs-success-bg-subtle:         rgba(25,135,84,.10);
            --bs-warning-bg-subtle:         rgba(255,193,7,.08);
            --bs-danger-bg-subtle:          rgba(220,53,69,.10);
            /* form controls slightly lighter than body so they stand out */
            --bs-form-control-bg:           #2a2a2a;
            /* elevated surface for cards/widgets — contrast against #181818 body */
            --ss-surface-bg:                #212121;
            /* card header (title+buttons) and pagination bands */
            --ss-card-header-bg:            #333333;
            --ss-pagination-bg:             #2a2a2a;
            /* status badge text — lighter tones for readability on dark surfaces */
            --ss-ok-text:                   #4ade80;
            --ss-err-text:                  #f87171;
        }
        [data-bs-theme="dark"] .form-control,
        [data-bs-theme="dark"] .form-select {
            background-color: var(--bs-tertiary-bg);
            border-color: var(--bs-border-color);
        }
        [data-bs-theme="dark"] .input-group-text {
            background-color: #242424;
            border-color: var(--bs-border-color);
            color: var(--bs-secondary-color);
        }
        [data-bs-theme="dark"] .dropdown-menu {
            --bs-dropdown-bg: #252525;
            --bs-dropdown-border-color: rgba(255,255,255,.09);
            --bs-dropdown-link-hover-bg: rgba(255,255,255,.06);
            --bs-dropdown-divider-bg: rgba(255,255,255,.08);
        }

        /* outline buttons: brighter on the deep dark background */
        [data-bs-theme="dark"] .btn-outline-secondary {
            --bs-btn-color:              #adb5bd;
            --bs-btn-border-color:       #6c757d;
            --bs-btn-hover-color:        #f8f9fa;
            --bs-btn-hover-bg:           #565c62;
            --bs-btn-hover-border-color: #6c757d;
            --bs-btn-active-color:       #f8f9fa;
            --bs-btn-active-bg:          #565c62;
            --bs-btn-active-border-color:#6c757d;
            --bs-btn-disabled-color:     #6c757d;
            --bs-btn-disabled-border-color: #6c757d;
        }
        [data-bs-theme="dark"] .btn-outline-danger {
            --bs-btn-color:        #ea868f;
            --bs-btn-border-color: #ea868f;
            --bs-btn-hover-color:  #fff;
        }
        [data-bs-theme="dark"] .btn-outline-primary {
            --bs-btn-color:        #6ea8fe;
            --bs-btn-border-color: #6ea8fe;
            --bs-btn-hover-color:  #fff;
        }
        [data-bs-theme="dark"] .btn-outline-warning {
            --bs-btn-color:        #ffc107;
            --bs-btn-border-color: #ffc107;
            --bs-btn-hover-color:  #000;
        }

        /* modal backdrop: use gray instead of black in dark mode for contrast */
        [data-bs-theme="dark"] .modal-backdrop {
            background-color: #2a1a1a;
            --bs-backdrop-opacity: 0.72;
        }

        /* navbar: keep bg-dark in light mode, blend with deep bg in dark mode */
        [data-bs-theme="dark"] .navbar.bg-dark {
            background-color: var(--bs-tertiary-bg) !important;
            border-bottom: 1px solid var(--bs-border-color);
        }

        /* Input-group focus: suppress individual shadow, ring the whole group instead */
        .input-group .form-control:focus,
        .input-group .form-select:focus { box-shadow: none; }
        .input-group:focus-within {
            border-radius: var(--bs-border-radius-sm);
            box-shadow: 0 0 0 .2rem rgba(var(--bs-primary-rgb),.25);
        }

        .form-control.item-key-ph::placeholder,
        .form-control[data-zero-as-blank]::placeholder {
            font-style: italic;
            opacity: 0.45;
        }

        /* Config field rows — flush layout with subtle row separator */
        .cfg-fields > .cfg-field-wrap { border-bottom: 1px solid rgba(0,0,0,.06); }
        .cfg-fields > .cfg-field-wrap:last-child,
        .cfg-fields > .cfg-field-wrap:has(+ hr) { border-bottom: none; }
        [data-bs-theme="dark"] .cfg-fields > .cfg-field-wrap { border-bottom-color: rgba(255,255,255,.05); }
        .cfg-field-wrap > .row {
            padding-left: .75rem;
            padding-right: .75rem;
            padding-top: .3rem;
            padding-bottom: .3rem;
            margin-bottom: 0 !important;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    {% block body %}{% endblock %}
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ServiceSentry — Microsoft Teams</title>
  <script src="{{ teams_sdk }}"></script>
  <style>
    html,body{height:100%;margin:0;font-family:Segoe UI,system-ui,sans-serif;background:#f5f5f7;color:#242424}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.9rem;text-align:center;padding:1.5rem}
    .spinner{width:2rem;height:2rem;border:3px solid #c7c9f0;border-top-color:#4b53bc;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #msg{font-size:.95rem;color:#444;max-width:28rem}
    a.btn{display:none;background:#4b53bc;color:#fff;text-decoration:none;padding:.5rem 1rem;border-radius:.4rem;font-size:.9rem}
    @media (prefers-color-scheme: dark){body{background:#1f1f1f;color:#eee}#msg{color:#bbb}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" id="spin"></div>
    <div id="msg">Signing you in to ServiceSentry…</div>
    <a class="btn" id="browser" href="/" target="_blank" rel="noopener">Open ServiceSentry in your browser</a>
  </div>
  <script>
  (function () {
    var msg = document.getElementById('msg'),
        spin = document.getElementById('spin'),
        browser = document.getElementById('browser');
    function fail(text) { if (spin) spin.style.display = 'none'; msg.textContent = text; browser.style.display = 'inline-block'; }
    if (!window.microsoftTeams) { fail('The Microsoft Teams SDK could not be loaded.'); return; }
    microsoftTeams.app.initialize()
      .then(function () { return microsoftTeams.authentication.getAuthToken(); })
      .then(function (token) {
        return fetch('/auth/msteams/sso', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ token: token })
        });
      })
      .then(function (r) { return r.json().then(function (d) { return { status: r.status, d: d }; }); })
      .then(function (res) {
        if (res.d && res.d.ok) { window.location = res.d.redirect || '/'; }
        else { fail((res.d && res.d.error) || 'Sign-in failed.'); }
      })
      .catch(function (e) { fail('Teams sign-in failed: ' + (e && e.message ? e.message : String(e))); });
  })();
  </script>
</body>
</html>

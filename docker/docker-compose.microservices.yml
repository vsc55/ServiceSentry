# ServiceSentry — microservices topology (MariaDB-backed)
# ========================================================
# Six containers, two MariaDB databases:
#   • db        — main MariaDB datastore (config, users, history, module tables,
#                 event rules, notification log …).
#   • syslog-db — dedicated MariaDB for the (high-volume) syslog messages, kept
#                 off the main DB so syslog ingestion/retention never contends
#                 with monitoring data.
#   • web       — the admin panel / UI (on-demand checks only; does NOT schedule).
#   • worker    — the periodic monitoring loop (owns scheduling).
#   • syslog    — the standalone syslog receiver (binds the UDP/TCP/TLS ports).
#   • events    — the decoupled event processor (evaluates notification rules).
#
#   cp docker/env.example docker/.env     # then edit (at least SS_PASSWORD + SS_DB_*
#                                         #  + SS_SYSLOG_DB_PASSWORD)
#   docker compose -f docker/docker-compose.microservices.yml up -d
#
# Why split the syslog receiver out: it binds privileged-ish network ports and
# handles untrusted input, so isolating it keeps that surface off the web/worker.
# The web container therefore runs with SS_SYSLOG_EMBEDDED=0 — it still shows the
# Syslog tab and serves stored messages from the syslog DB, but does not bind the
# ports (the syslog container owns them). Enabling/disabling the receiver or
# changing its ports from the UI is picked up by the syslog container live (it
# polls the main DB for config), so no restart is needed.
#
# The syslog messages live in their own database (SS_SYSLOG_DB_ENABLED=1): the web
# and syslog containers both point at ``syslog-db``; the worker doesn't touch
# syslog so it only gets the main DB env.
#
# The web service runs with SS_MONITORING_EMBEDDED=0: the worker container owns the
# monitoring scheduler, and two schedulers with no shared lock would double every
# check. (Same embedded-off pattern as SS_SYSLOG_EMBEDDED / SS_EVENTS_EMBEDDED.)

# Main database connection env — overlaid onto the (empty) config.json
# ``database`` section at bootstrap by every ServiceSentry process (SS_DB_*).
x-db-env: &db-env
  SS_DB_DRIVER: mysql
  SS_DB_HOST: db
  SS_DB_PORT: "3306"
  SS_DB_NAME: ${SS_DB_NAME:-servicesentry}
  SS_DB_USER: ${SS_DB_USER:-servicesentry}
  SS_DB_PASSWORD: ${SS_DB_PASSWORD:?set SS_DB_PASSWORD in docker/.env}

# Dedicated syslog database env — overlaid onto the config.json ``syslog_db``
# section (SS_SYSLOG_DB_*). ENABLED=1 routes syslog messages here instead of the
# main DB. Applied to the web + syslog containers only.
x-syslog-db-env: &syslog-db-env
  SS_SYSLOG_DB_ENABLED: "1"
  SS_SYSLOG_DB_DRIVER: mysql
  SS_SYSLOG_DB_HOST: syslog-db
  SS_SYSLOG_DB_PORT: "3306"
  SS_SYSLOG_DB_NAME: ${SS_SYSLOG_DB_NAME:-servicesentry_syslog}
  SS_SYSLOG_DB_USER: ${SS_SYSLOG_DB_USER:-servicesentry}
  SS_SYSLOG_DB_PASSWORD: ${SS_SYSLOG_DB_PASSWORD:?set SS_SYSLOG_DB_PASSWORD in docker/.env}

services:

  # ── Main database ───────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: servicesentry-db
    restart: unless-stopped
    networks:
      - backend
    environment:
      MARIADB_DATABASE: ${SS_DB_NAME:-servicesentry}
      MARIADB_USER: ${SS_DB_USER:-servicesentry}
      MARIADB_PASSWORD: ${SS_DB_PASSWORD:?set SS_DB_PASSWORD in docker/.env}
      MARIADB_ROOT_PASSWORD: ${SS_DB_ROOT_PASSWORD:?set SS_DB_ROOT_PASSWORD in docker/.env}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Dedicated syslog database ───────────────────────────────────────────────
  syslog-db:
    image: mariadb:11
    container_name: servicesentry-syslog-db
    restart: unless-stopped
    networks:
      - backend
    environment:
      MARIADB_DATABASE: ${SS_SYSLOG_DB_NAME:-servicesentry_syslog}
      MARIADB_USER: ${SS_SYSLOG_DB_USER:-servicesentry}
      MARIADB_PASSWORD: ${SS_SYSLOG_DB_PASSWORD:?set SS_SYSLOG_DB_PASSWORD in docker/.env}
      MARIADB_ROOT_PASSWORD: ${SS_SYSLOG_DB_ROOT_PASSWORD:?set SS_SYSLOG_DB_ROOT_PASSWORD in docker/.env}
    volumes:
      - syslogdbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Web admin panel ─────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: servicesentry:latest
    container_name: servicesentry-web
    restart: unless-stopped
    networks:
      # backend: reach the databases; frontend: the externally-published plane.
      - backend
      - frontend
    ports:
      - "8080:8080"
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    cap_add:
      # The web panel runs module checks in-process when triggered manually.
      # Ping modules require raw ICMP sockets. Remove if not using ping monitoring.
      - NET_RAW
    # Secrets + custom config (credentials, telegram, locale, security, …).
    env_file:
      - .env
    # Per-topology values — kept here, not in .env:
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: web
      SS_WEB_HOST: 0.0.0.0
      SS_WEB_PORT: "8080"
      # The worker container owns the monitoring scheduler; keep it out of the web
      # process (otherwise both would schedule and double every check).
      SS_MONITORING_EMBEDDED: "0"
      # The syslog container owns the listener; the web only shows stored data.
      SS_SYSLOG_EMBEDDED: "0"
      # The events container owns rule evaluation; keep it out of the web process.
      # (Pair with events|mode=external in config for a fully separate worker.)
      SS_EVENTS_EMBEDDED: "0"
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:${SS_WEB_PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Background monitoring worker ────────────────────────────────────────────
  worker:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-worker
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    cap_add:
      # Required by the ping watchful module (raw ICMP sockets).
      # Remove if not using ping monitoring.
      - NET_RAW
    env_file:
      - .env
    environment:
      <<: *db-env
      SS_SERVICE_ROLE: worker
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Standalone syslog receiver ──────────────────────────────────────────────
  syslog:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-syslog
    restart: unless-stopped
    networks:
      # backend only: the DBs. Its external ingress is the host port mapping
      # below (raw UDP/TCP), not the frontend HTTP plane.
      - backend
    # Syslog listener ports. Defaults: UDP 514, TCP 514, TLS 6514 (TLS off until
    # tls_cert/tls_key are configured). Adjust the host side if 514 is taken.
    ports:
      - "514:514/udp"
      - "514:514/tcp"
      - "6514:6514/tcp"
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    env_file:
      - .env
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: syslog
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Standalone event processor ──────────────────────────────────────────────
  # Decoupled rule evaluation: reads new syslog/audit rows by cursor, evaluates the
  # rules edited in the web UI and dispatches notifications.  No ingress ports — it
  # only talks to the databases (audit/rules on the main DB, syslog on its own).
  # Pairs with SS_EVENTS_EMBEDDED=0 on the web service so a single worker owns it.
  events:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-events
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    env_file:
      - .env
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: events
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
      web:
        condition: service_healthy

# ── Named volumes ─────────────────────────────────────────────────────────────
# Docker manages these volumes; inspect their location with:
#   docker volume inspect docker_config
#   docker volume inspect docker_vardata
#   docker volume inspect docker_dbdata
#   docker volume inspect docker_syslogdbdata
volumes:
  config:
  vardata:
  dbdata:
  syslogdbdata:

# ── Networks ──────────────────────────────────────────────────────────────────
# Two planes for isolation:
#   • backend  — internal service↔service + database traffic. The databases live
#                ONLY here, so they're never on the externally-reachable plane.
#   • frontend — the externally-facing plane (the web panel; in the Traefik
#                topology, the reverse proxy routes to the web over this network).
networks:
  backend:
  frontend:

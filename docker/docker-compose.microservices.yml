# ServiceSentry — microservices topology
# =======================================
# Two containers: the web admin panel (UI + on-demand checks) and a dedicated
# worker that runs the periodic monitoring loop. The web does NOT self-schedule
# here (SS_AUTOSTART=false) — the worker owns monitoring, which survives web
# restarts and keeps check load off the request path.
#
#   cp docker/env.example docker/.env      # then edit docker/.env (at least SS_PASSWORD)
#   docker compose -f docker/docker-compose.microservices.yml up -d
#
# Secrets and custom settings live in docker/.env (gitignored); see env.example.
# Do NOT also enable SS_AUTOSTART on the web service: the worker and the web
# scheduler are separate processes with no shared lock, so running both would
# double every check (duplicate history + notification storms).

services:

  # ── Web admin panel ─────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: servicesentry:latest
    container_name: servicesentry-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    cap_add:
      # The web panel runs module checks in-process when triggered manually.
      # Ping modules require raw ICMP sockets. Remove if not using ping monitoring.
      - NET_RAW
    # Secrets + custom config (credentials, telegram, locale, security, …).
    env_file:
      - .env
    # Per-topology values — kept here, not in .env:
    environment:
      - SS_SERVICE_ROLE=web
      - SS_WEB_HOST=0.0.0.0
      - SS_WEB_PORT=8080
      # Keep false: the worker container does the monitoring.
      - SS_AUTOSTART=false

    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:${SS_WEB_PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Background monitoring worker ────────────────────────────────────────────
  worker:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-worker
    restart: unless-stopped
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    cap_add:
      # Required by the ping watchful module (raw ICMP sockets).
      # Remove if not using ping monitoring.
      - NET_RAW
    # Same shared secrets/config; the worker only needs SS_CHECK_INTERVAL + telegram.
    env_file:
      - .env
    environment:
      - SS_SERVICE_ROLE=worker

    depends_on:
      web:
        condition: service_healthy

# ── Named volumes ─────────────────────────────────────────────────────────────
# Docker manages these volumes; inspect their location with:
#   docker volume inspect docker_config
#   docker volume inspect docker_vardata
volumes:
  config:
  vardata:

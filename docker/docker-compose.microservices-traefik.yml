# ServiceSentry — microservices topology behind Traefik (public/Internet)
# =======================================================================
# Same six-container, two-database split as docker-compose.microservices.yml,
# but published to the Internet through a Traefik reverse proxy with automatic
# Let's Encrypt TLS. Seven containers, two MariaDB databases:
#   • traefik    — reverse proxy: terminates TLS, redirects HTTP→HTTPS, routes
#                  your domain to the web container (the ONLY service publishing
#                  80/443 to the host).
#   • db         — main MariaDB datastore (config, users, history, module tables,
#                  event rules, notification log …).
#   • syslog-db  — dedicated MariaDB for the (high-volume) syslog messages.
#   • web        — the admin panel / UI (no host port; Traefik fronts it).
#   • worker     — the periodic monitoring loop (owns scheduling).
#   • syslog     — the standalone syslog receiver (binds the UDP/TCP/TLS ports
#                  directly on the host; raw syslog is NOT proxied by Traefik).
#   • events     — the decoupled event processor (evaluates notification rules).
#
#   cp docker/env.example docker/.env     # then edit. REQUIRED here, on top of
#                                         #  the microservices vars:
#                                         #    SS_DOMAIN, SS_ACME_EMAIL
#   docker compose -f docker/docker-compose.microservices-traefik.yml up -d
#
# DNS: point an A/AAAA record for SS_DOMAIN at this host BEFORE first start, so
# the Let's Encrypt TLS-ALPN challenge on :443 can validate the certificate.
#
# Networks (isolation):
#   • backend  — internal service↔service + database traffic; the databases live
#                ONLY here, never on the public plane.
#   • frontend — Traefik ↔ web. Only Traefik publishes ports to the host.
#
# The web service runs with SS_MONITORING_EMBEDDED=0: the worker container owns the
# monitoring scheduler, and two schedulers with no shared lock would double every
# check. (Same embedded-off pattern as SS_SYSLOG_EMBEDDED / SS_EVENTS_EMBEDDED.)

# Main database connection env (SS_DB_*) — overlaid onto the config.json
# ``database`` section at bootstrap by every ServiceSentry process.
x-db-env: &db-env
  SS_DB_DRIVER: mysql
  SS_DB_HOST: db
  SS_DB_PORT: "3306"
  SS_DB_NAME: ${SS_DB_NAME:-servicesentry}
  SS_DB_USER: ${SS_DB_USER:-servicesentry}
  SS_DB_PASSWORD: ${SS_DB_PASSWORD:?set SS_DB_PASSWORD in docker/.env}

# Dedicated syslog database env (SS_SYSLOG_DB_*). ENABLED=1 routes syslog messages
# to syslog-db instead of the main DB. Applied to the web + syslog containers.
x-syslog-db-env: &syslog-db-env
  SS_SYSLOG_DB_ENABLED: "1"
  SS_SYSLOG_DB_DRIVER: mysql
  SS_SYSLOG_DB_HOST: syslog-db
  SS_SYSLOG_DB_PORT: "3306"
  SS_SYSLOG_DB_NAME: ${SS_SYSLOG_DB_NAME:-servicesentry_syslog}
  SS_SYSLOG_DB_USER: ${SS_SYSLOG_DB_USER:-servicesentry}
  SS_SYSLOG_DB_PASSWORD: ${SS_SYSLOG_DB_PASSWORD:?set SS_SYSLOG_DB_PASSWORD in docker/.env}

services:

  # ── Reverse proxy (public TLS) ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: servicesentry-traefik
    restart: unless-stopped
    command:
      # Docker provider: only containers with traefik.enable=true are exposed.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ss_frontend"
      # Entry points: :80 (HTTP, redirected) and :443 (HTTPS).
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global HTTP→HTTPS redirect.
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via the TLS-ALPN-01 challenge on :443.
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${SS_ACME_EMAIL:?set SS_ACME_EMAIL in docker/.env}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only docker socket so Traefik can watch container labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Main database ───────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: servicesentry-db
    restart: unless-stopped
    networks:
      - backend
    environment:
      MARIADB_DATABASE: ${SS_DB_NAME:-servicesentry}
      MARIADB_USER: ${SS_DB_USER:-servicesentry}
      MARIADB_PASSWORD: ${SS_DB_PASSWORD:?set SS_DB_PASSWORD in docker/.env}
      MARIADB_ROOT_PASSWORD: ${SS_DB_ROOT_PASSWORD:?set SS_DB_ROOT_PASSWORD in docker/.env}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Dedicated syslog database ───────────────────────────────────────────────
  syslog-db:
    image: mariadb:11
    container_name: servicesentry-syslog-db
    restart: unless-stopped
    networks:
      - backend
    environment:
      MARIADB_DATABASE: ${SS_SYSLOG_DB_NAME:-servicesentry_syslog}
      MARIADB_USER: ${SS_SYSLOG_DB_USER:-servicesentry}
      MARIADB_PASSWORD: ${SS_SYSLOG_DB_PASSWORD:?set SS_SYSLOG_DB_PASSWORD in docker/.env}
      MARIADB_ROOT_PASSWORD: ${SS_SYSLOG_DB_ROOT_PASSWORD:?set SS_SYSLOG_DB_ROOT_PASSWORD in docker/.env}
    volumes:
      - syslogdbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Web admin panel (behind Traefik, no host port) ──────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: servicesentry:latest
    container_name: servicesentry-web
    # Non-root: web runs no in-process checks here (*_EMBEDDED=0), so no NET_RAW/privileged port needed.
    user: ssentry
    restart: unless-stopped
    networks:
      # backend: reach the databases; frontend: Traefik routes to it here.
      - backend
      - frontend
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    cap_add:
      # The web panel runs module checks in-process when triggered manually.
      # Ping modules require raw ICMP sockets. Remove if not using ping monitoring.
      - NET_RAW
    # Secrets + custom config (credentials, telegram, locale, security, …).
    env_file:
      - .env
    # Per-topology values — kept here, not in .env:
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: web
      SS_WEB_HOST: 0.0.0.0
      SS_WEB_PORT: "8080"
      # The worker container owns the monitoring scheduler; keep it out of the web
      # process (otherwise both would schedule and double every check).
      SS_MONITORING_EMBEDDED: "0"
      # The syslog container owns the listener; the web only shows stored data.
      SS_SYSLOG_EMBEDDED: "0"
      # The events container owns rule evaluation; keep it out of the web process.
      SS_EVENTS_EMBEDDED: "0"
      # Behind a TLS-terminating reverse proxy: trust 1 proxy hop, mark cookies
      # secure, and advertise the public URL for absolute links / redirects.
      SS_PROXY_COUNT: "1"
      SS_SECURE_COOKIES: "true"
      SS_PUBLIC_URL: ${SS_DOMAIN:?set SS_DOMAIN in docker/.env}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ss_frontend"
      # HTTPS router for your domain → this service on :8080.
      - "traefik.http.routers.ss-web.rule=Host(`${SS_DOMAIN:?set SS_DOMAIN in docker/.env}`)"
      - "traefik.http.routers.ss-web.entrypoints=websecure"
      - "traefik.http.routers.ss-web.tls=true"
      - "traefik.http.routers.ss-web.tls.certresolver=le"
      - "traefik.http.services.ss-web.loadbalancer.server.port=8080"
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:${SS_WEB_PORT:-8080}/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Background monitoring worker ────────────────────────────────────────────
  worker:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-worker
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    # Runs as root: the ping module uses pythonping (raw ICMP), which needs NET_RAW as an *ambient* capability — not grantable to a non-root user via cap_add. Grant ambient NET_RAW (or drop ping) to run this non-root.
    cap_add:
      # Required by the ping watchful module (raw ICMP sockets).
      # Remove if not using ping monitoring.
      - NET_RAW
    env_file:
      - .env
    environment:
      <<: *db-env
      SS_SERVICE_ROLE: worker
      # Address the web pokes for instant control (backend net). SS_CONTROL_TOKEN
      # from .env enables it; empty = poke off, periodic reconcile still works.
      SS_CONTROL_ADVERTISE: worker
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── (OPCIONAL) Enrutar syslog también por Traefik ───────────────────────────
  # Por defecto el contenedor `syslog` publica sus puertos DIRECTAMENTE en el host
  # (ver el `ports:` de abajo) para preservar la IP de origen del emisor. Traefik
  # PUEDE frontear syslog con routers TCP/UDP, pero al reabrir la conexión el
  # receptor vería la IP de TRAEFIK como origen de TODOS los mensajes — rompe el
  # allowlist `allowed_sources` (filtrado por IP/CIDR), el campo "source" de la
  # pestaña Syslog y el matching por host de las reglas de eventos. UDP no puede
  # preservar la IP en absoluto; TCP solo con PROXY protocol (que el listener no
  # parsea). Úsalo SOLO si priorizas un único punto de ingreso y NO usas filtrado
  # por IP. Para activarlo:
  #
  #  1) Añade estos entrypoints al `command:` del servicio `traefik`:
  #       - "--entrypoints.syslog-udp.address=:514/udp"
  #       - "--entrypoints.syslog-tcp.address=:514/tcp"
  #       - "--entrypoints.syslog-tls.address=:6514/tcp"
  #  2) Mueve el bloque `ports:` del servicio `syslog` (abajo) al servicio
  #     `traefik` (y QUÍTALO de `syslog`):
  #       ports:
  #         - "514:514/udp"
  #         - "514:514/tcp"
  #         - "6514:6514/tcp"
  #  3) Conecta `syslog` a la red `frontend` y añádele las labels de router:
  #       networks: [backend, frontend]
  #       labels:
  #         - "traefik.enable=true"
  #         - "traefik.docker.network=ss_frontend"
  #         # UDP (sin regla: UDP no tiene SNI/Host)
  #         - "traefik.udp.routers.ss-syslog-udp.entrypoints=syslog-udp"
  #         - "traefik.udp.routers.ss-syslog-udp.service=ss-syslog-udp"
  #         - "traefik.udp.services.ss-syslog-udp.loadbalancer.server.port=514"
  #         # TCP plano (HostSNI(`*`) es obligatorio en routers TCP no-TLS)
  #         - "traefik.tcp.routers.ss-syslog-tcp.entrypoints=syslog-tcp"
  #         - "traefik.tcp.routers.ss-syslog-tcp.rule=HostSNI(`*`)"
  #         - "traefik.tcp.routers.ss-syslog-tcp.service=ss-syslog-tcp"
  #         - "traefik.tcp.services.ss-syslog-tcp.loadbalancer.server.port=514"
  #         # TLS passthrough (el cert lo sigue sirviendo el syslog, NO Let's Encrypt)
  #         - "traefik.tcp.routers.ss-syslog-tls.entrypoints=syslog-tls"
  #         - "traefik.tcp.routers.ss-syslog-tls.rule=HostSNI(`*`)"
  #         - "traefik.tcp.routers.ss-syslog-tls.tls.passthrough=true"
  #         - "traefik.tcp.routers.ss-syslog-tls.service=ss-syslog-tls"
  #         - "traefik.tcp.services.ss-syslog-tls.loadbalancer.server.port=6514"

  # ── Standalone syslog receiver ──────────────────────────────────────────────
  syslog:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-syslog
    user: ssentry
    restart: unless-stopped
    sysctls:
      # Let the non-root process bind the privileged syslog port (514).
      - net.ipv4.ip_unprivileged_port_start=0
    networks:
      # backend only: the DBs. Raw syslog ingress is the host port mapping below
      # (UDP/TCP) — Traefik does NOT front syslog by default, so the receiver keeps
      # the sender's real source IP (allowlist + per-host rules). See the OPTIONAL
      # block above to route it through Traefik (and the source-IP trade-off).
      - backend
    # Syslog listener ports. Defaults: UDP 514, TCP 514, TLS 6514 (TLS off until
    # tls_cert/tls_key are configured). Adjust the host side if 514 is taken.
    ports:
      - "514:514/udp"
      - "514:514/tcp"
      - "6514:6514/tcp"
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    env_file:
      - .env
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: syslog
      SS_CONTROL_ADVERTISE: syslog     # address the web pokes for instant control
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Standalone event processor ──────────────────────────────────────────────
  # Decoupled rule evaluation: reads new syslog/audit rows by cursor, evaluates the
  # rules edited in the web UI and dispatches notifications. No ingress ports — it
  # only talks to the databases. Pairs with SS_EVENTS_EMBEDDED=0 on the web service.
  events:
    image: servicesentry:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: servicesentry-events
    user: ssentry
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - config:/etc/ServiSesentry
      - vardata:/var/lib/ServiSesentry
    env_file:
      - .env
    environment:
      <<: [*db-env, *syslog-db-env]
      SS_SERVICE_ROLE: events
      SS_CONTROL_ADVERTISE: events     # address the web pokes for instant control
    depends_on:
      db:
        condition: service_healthy
      syslog-db:
        condition: service_healthy
      web:
        condition: service_healthy

# ── Named volumes ─────────────────────────────────────────────────────────────
# NOTE: web/syslog/events run as the non-root 'ssentry' user (uid 1000). On a FRESH deploy the named volumes inherit that ownership from the image; for an EXISTING install whose volumes are root-owned, chown them once: docker run --rm -v <vol>:/d alpine chown -R 1000:1000 /d
volumes:
  config:
  vardata:
  dbdata:
  syslogdbdata:
  letsencrypt:           # Traefik's acme.json (issued certificates)

# ── Networks ──────────────────────────────────────────────────────────────────
# backend  — internal service↔service + database traffic (databases ONLY here).
# frontend — Traefik ↔ web (the only externally-published plane). Fixed names
#            (ss_backend / ss_frontend) so Traefik's provider.docker.network +
#            the per-service traefik.docker.network label resolve regardless of
#            the compose project name.
networks:
  backend:
    name: ss_backend
  frontend:
    name: ss_frontend

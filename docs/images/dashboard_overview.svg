<!-- ServiceSentry UI Mockup — Dashboard Overview -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Body background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- ===== TOP NAVBAR ===== -->
  <rect width="1200" height="52" fill="#212529"/>
  <!-- Logo -->
  <text x="16" y="33" fill="#ffffff" font-size="16" font-weight="700">⚡ ServiceSentry</text>

  <!-- Active tab: Overview -->
  <rect x="140" y="0" width="80" height="52" fill="#ffffff" opacity="0.12" rx="0"/>
  <text x="180" y="31" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Overview</text>

  <!-- Inactive tabs -->
  <text x="265" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Modules</text>
  <text x="340" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Config</text>
  <text x="410" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Status</text>
  <text x="478" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Audit</text>
  <text x="548" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Access</text>
  <text x="628" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Sessions</text>

  <!-- Right side -->
  <text x="1140" y="31" fill="#adb5bd" font-size="15" text-anchor="middle">🌙</text>
  <text x="1175" y="31" fill="#adb5bd" font-size="12" text-anchor="middle">admin ▾</text>

  <!-- ===== TOOLBAR ===== -->
  <rect x="0" y="52" width="1200" height="40" fill="#ffffff"/>
  <line x1="0" y1="92" x2="1200" y2="92" stroke="#dee2e6" stroke-width="1"/>

  <!-- Auto-refresh label -->
  <text x="16" y="76" fill="#6c757d" font-size="12">Auto-refresh:</text>

  <!-- OFF button (active/blue) -->
  <rect x="106" y="61" width="36" height="22" fill="#0d6efd" rx="4"/>
  <text x="124" y="76" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">OFF</text>

  <!-- 10s button -->
  <rect x="146" y="61" width="36" height="22" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="164" y="76" fill="#6c757d" font-size="11" text-anchor="middle">10s</text>

  <!-- 30s button -->
  <rect x="186" y="61" width="36" height="22" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="204" y="76" fill="#6c757d" font-size="11" text-anchor="middle">30s</text>

  <!-- 60s button -->
  <rect x="226" y="61" width="36" height="22" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="244" y="76" fill="#6c757d" font-size="11" text-anchor="middle">60s</text>

  <!-- Refresh icon button -->
  <rect x="270" y="61" width="30" height="22" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="285" y="76" fill="#6c757d" font-size="13" text-anchor="middle">↻</text>

  <!-- Edit Dashboard button (right) -->
  <rect x="1077" y="61" width="116" height="26" fill="#0d6efd" rx="4"/>
  <text x="1135" y="78" fill="#ffffff" font-size="12" text-anchor="middle">✏ Edit Dashboard</text>

  <!-- ===== ROW 1: STAT CARDS ===== -->
  <!-- Card 1: Modules -->
  <rect x="16" y="108" width="185" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="28" y="126" fill="#6c757d" font-size="12">Modules</text>
  <text x="28" y="168" fill="#212529" font-size="30" font-weight="700">2</text>
  <text x="28" y="192" fill="#6c757d" font-size="12">2 of 6 enabled</text>
  <text x="185" y="130" fill="#fd7e14" font-size="22" text-anchor="end">📦</text>

  <!-- Card 2: Checks -->
  <rect x="213" y="108" width="185" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="225" y="126" fill="#6c757d" font-size="12">Checks</text>
  <text x="225" y="168" fill="#212529" font-size="30" font-weight="700">1</text>
  <text x="225" y="192" fill="#6c757d" font-size="12">1 OK · 0 errors</text>
  <text x="382" y="130" fill="#198754" font-size="22" text-anchor="end">✓</text>

  <!-- Card 3: Sessions -->
  <rect x="410" y="108" width="185" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="422" y="126" fill="#6c757d" font-size="12">Sessions</text>
  <text x="422" y="168" fill="#212529" font-size="30" font-weight="700">1</text>
  <text x="422" y="192" fill="#6c757d" font-size="12">1 active user</text>
  <text x="579" y="130" fill="#0d6efd" font-size="22" text-anchor="end">👤</text>

  <!-- Card 4: Users -->
  <rect x="607" y="108" width="185" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="619" y="126" fill="#6c757d" font-size="12">Users</text>
  <text x="619" y="168" fill="#212529" font-size="30" font-weight="700">1</text>
  <text x="619" y="192" fill="#6c757d" font-size="12">1 admin</text>
  <text x="776" y="130" fill="#6f42c1" font-size="22" text-anchor="end">👥</text>

  <!-- Card 5: Groups -->
  <rect x="804" y="108" width="185" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="816" y="126" fill="#6c757d" font-size="12">Groups</text>
  <text x="816" y="168" fill="#212529" font-size="30" font-weight="700">1</text>
  <text x="816" y="192" fill="#6c757d" font-size="12">0 memberships</text>
  <text x="973" y="130" fill="#0dcaf0" font-size="22" text-anchor="end">🏢</text>

  <!-- Card 6: Roles -->
  <rect x="1001" y="108" width="183" height="110" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="1013" y="126" fill="#6c757d" font-size="12">Roles</text>
  <text x="1013" y="168" fill="#212529" font-size="30" font-weight="700">3</text>
  <text x="1013" y="192" fill="#6c757d" font-size="12">3 built-in · 0 custom</text>
  <text x="1178" y="130" fill="#6f42c1" font-size="22" text-anchor="end">🛡</text>

  <!-- ===== ROW 2: TABLE WIDGETS ===== -->

  <!-- Widget 1: Module List (left half) -->
  <rect x="16" y="240" width="578" height="270" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <!-- Card header -->
  <rect x="16" y="240" width="578" height="36" fill="#f8f9fa" rx="6"/>
  <rect x="16" y="258" width="578" height="18" fill="#f8f9fa"/>
  <line x1="16" y1="276" x2="594" y2="276" stroke="#dee2e6" stroke-width="1"/>
  <text x="28" y="263" fill="#212529" font-size="13" font-weight="600">📦 Modules</text>
  <!-- Refresh button in header -->
  <rect x="557" y="248" width="26" height="20" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="570" y="262" fill="#6c757d" font-size="13" text-anchor="middle">↻</text>

  <!-- Table header -->
  <rect x="16" y="276" width="578" height="30" fill="#f8f9fa"/>
  <line x1="16" y1="306" x2="594" y2="306" stroke="#dee2e6" stroke-width="1"/>
  <text x="32" y="295" fill="#6c757d" font-size="12" font-weight="600">Module ↕</text>
  <text x="220" y="295" fill="#6c757d" font-size="12" font-weight="600">Active ↕</text>
  <text x="340" y="295" fill="#6c757d" font-size="12" font-weight="600">Checks ↕</text>
  <text x="470" y="295" fill="#6c757d" font-size="12" font-weight="600">Items ↕</text>

  <!-- Row 1: ping -->
  <rect x="16" y="306" width="578" height="36" fill="#ffffff"/>
  <line x1="16" y1="342" x2="594" y2="342" stroke="#dee2e6" stroke-width="1"/>
  <text x="32" y="328" fill="#212529" font-size="13">ping</text>
  <!-- ON badge -->
  <rect x="210" y="316" width="32" height="18" fill="#198754" rx="4"/>
  <text x="226" y="329" fill="#ffffff" font-size="11" text-anchor="middle">ON</text>
  <!-- OK badge -->
  <rect x="328" y="316" width="38" height="18" fill="#198754" rx="4"/>
  <text x="347" y="329" fill="#ffffff" font-size="11" text-anchor="middle">✅ OK</text>
  <text x="470" y="328" fill="#212529" font-size="13">2</text>

  <!-- Row 2: web -->
  <rect x="16" y="342" width="578" height="36" fill="#f8f9fa"/>
  <line x1="16" y1="378" x2="594" y2="378" stroke="#dee2e6" stroke-width="1"/>
  <text x="32" y="364" fill="#212529" font-size="13">web</text>
  <!-- ON badge -->
  <rect x="210" y="352" width="32" height="18" fill="#198754" rx="4"/>
  <text x="226" y="365" fill="#ffffff" font-size="11" text-anchor="middle">ON</text>
  <!-- Dash -->
  <text x="347" y="364" fill="#6c757d" font-size="13" text-anchor="middle">—</text>
  <text x="470" y="364" fill="#212529" font-size="13">1</text>

  <!-- Widget 2: Recent Activity (right half) -->
  <rect x="606" y="240" width="578" height="270" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <!-- Card header -->
  <rect x="606" y="240" width="578" height="36" fill="#f8f9fa" rx="6"/>
  <rect x="606" y="258" width="578" height="18" fill="#f8f9fa"/>
  <line x1="606" y1="276" x2="1184" y2="276" stroke="#dee2e6" stroke-width="1"/>
  <text x="618" y="263" fill="#212529" font-size="13" font-weight="600">📋 Recent Activity</text>
  <!-- Refresh button in header -->
  <rect x="1147" y="248" width="26" height="20" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="1160" y="262" fill="#6c757d" font-size="13" text-anchor="middle">↻</text>

  <!-- Table header -->
  <rect x="606" y="276" width="578" height="30" fill="#f8f9fa"/>
  <line x1="606" y1="306" x2="1184" y2="306" stroke="#dee2e6" stroke-width="1"/>
  <text x="622" y="295" fill="#6c757d" font-size="12" font-weight="600">Time ↕</text>
  <text x="740" y="295" fill="#6c757d" font-size="12" font-weight="600">Event ↕</text>
  <text x="1060" y="295" fill="#6c757d" font-size="12" font-weight="600">User ↕</text>

  <!-- Audit Row 1 -->
  <rect x="606" y="306" width="578" height="36" fill="#ffffff"/>
  <line x1="606" y1="342" x2="1184" y2="342" stroke="#dee2e6" stroke-width="1"/>
  <text x="622" y="328" fill="#6c757d" font-size="12">10:05</text>
  <text x="740" y="328" fill="#212529" font-size="13">login_ok</text>
  <text x="1060" y="328" fill="#212529" font-size="13">admin</text>

  <!-- Audit Row 2 -->
  <rect x="606" y="342" width="578" height="36" fill="#f8f9fa"/>
  <line x1="606" y1="378" x2="1184" y2="378" stroke="#dee2e6" stroke-width="1"/>
  <text x="622" y="364" fill="#6c757d" font-size="12">10:03</text>
  <text x="740" y="364" fill="#212529" font-size="13">config_saved</text>
  <text x="1060" y="364" fill="#212529" font-size="13">admin</text>

  <!-- Audit Row 3 -->
  <rect x="606" y="378" width="578" height="36" fill="#ffffff"/>
  <line x1="606" y1="414" x2="1184" y2="414" stroke="#dee2e6" stroke-width="1"/>
  <text x="622" y="400" fill="#6c757d" font-size="12">09:58</text>
  <text x="740" y="400" fill="#212529" font-size="13">modules_saved</text>
  <text x="1060" y="400" fill="#212529" font-size="13">admin</text>

</svg>

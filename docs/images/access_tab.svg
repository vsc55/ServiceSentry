<!-- ServiceSentry UI Mockup — Access Tab (Users) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Body background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- ===== TOP NAVBAR ===== -->
  <rect width="1200" height="52" fill="#212529"/>
  <text x="16" y="33" fill="#ffffff" font-size="16" font-weight="700">⚡ ServiceSentry</text>

  <!-- Inactive tabs -->
  <text x="180" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Overview</text>
  <text x="265" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Modules</text>
  <text x="340" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Config</text>
  <text x="410" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Status</text>
  <text x="478" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Audit</text>

  <!-- Active tab: Access -->
  <rect x="508" y="0" width="80" height="52" fill="#ffffff" opacity="0.12" rx="0"/>
  <text x="548" y="31" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Access</text>

  <text x="628" y="31" fill="#adb5bd" font-size="13" text-anchor="middle">Sessions</text>

  <!-- Right side -->
  <text x="1140" y="31" fill="#adb5bd" font-size="15" text-anchor="middle">🌙</text>
  <text x="1175" y="31" fill="#adb5bd" font-size="12" text-anchor="middle">admin ▾</text>

  <!-- ===== SUB-TAB BAR ===== -->
  <rect x="0" y="52" width="1200" height="36" fill="#ffffff"/>
  <line x1="0" y1="88" x2="1200" y2="88" stroke="#dee2e6" stroke-width="1"/>

  <!-- Active sub-tab: Users -->
  <text x="24" y="75" fill="#0d6efd" font-size="13" font-weight="600">Users</text>
  <line x1="16" y1="87" x2="60" y2="87" stroke="#0d6efd" stroke-width="2"/>

  <!-- Inactive sub-tabs -->
  <text x="90" y="75" fill="#6c757d" font-size="13">Roles</text>
  <text x="146" y="75" fill="#6c757d" font-size="13">Groups</text>
  <text x="212" y="75" fill="#6c757d" font-size="13">Sessions</text>

  <!-- ===== TOOLBAR ===== -->
  <rect x="0" y="88" width="1200" height="40" fill="#ffffff"/>
  <line x1="0" y1="128" x2="1200" y2="128" stroke="#dee2e6" stroke-width="1"/>

  <!-- New User button (right) -->
  <rect x="1083" y="99" width="100" height="26" fill="#0d6efd" rx="4"/>
  <text x="1133" y="116" fill="#ffffff" font-size="12" text-anchor="middle">+ New User</text>

  <!-- ===== USERS TABLE ===== -->
  <rect x="16" y="144" width="660" height="320" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>

  <!-- Table header row -->
  <rect x="16" y="144" width="660" height="32" fill="#f8f9fa" rx="6"/>
  <rect x="16" y="160" width="660" height="16" fill="#f8f9fa"/>
  <line x1="16" y1="176" x2="676" y2="176" stroke="#dee2e6" stroke-width="1"/>
  <text x="30" y="164" fill="#6c757d" font-size="12" font-weight="600">Username ↕</text>
  <text x="170" y="164" fill="#6c757d" font-size="12" font-weight="600">Display Name ↕</text>
  <text x="330" y="164" fill="#6c757d" font-size="12" font-weight="600">Role ↕</text>
  <text x="430" y="164" fill="#6c757d" font-size="12" font-weight="600">Groups ↕</text>
  <text x="570" y="164" fill="#6c757d" font-size="12" font-weight="600">Actions</text>

  <!-- Row 1: admin -->
  <rect x="16" y="176" width="660" height="40" fill="#ffffff"/>
  <line x1="16" y1="216" x2="676" y2="216" stroke="#dee2e6" stroke-width="1"/>
  <text x="30" y="200" fill="#212529" font-size="13">admin</text>
  <text x="170" y="200" fill="#212529" font-size="13">Administrator</text>
  <!-- admin badge (blue) -->
  <rect x="322" y="190" width="46" height="18" fill="#0d6efd" rx="4"/>
  <text x="345" y="203" fill="#ffffff" font-size="11" text-anchor="middle">admin</text>
  <text x="430" y="200" fill="#212529" font-size="12">administrators</text>
  <!-- Edit button -->
  <rect x="562" y="190" width="50" height="20" fill="#0d6efd" rx="4"/>
  <text x="587" y="204" fill="#ffffff" font-size="11" text-anchor="middle">✏ Edit</text>
  <!-- Password button -->
  <rect x="618" y="190" width="50" height="20" fill="#6c757d" rx="4"/>
  <text x="643" y="204" fill="#ffffff" font-size="11" text-anchor="middle">🔒 Pwd</text>

  <!-- Row 2: editor1 -->
  <rect x="16" y="216" width="660" height="40" fill="#f8f9fa"/>
  <line x1="16" y1="256" x2="676" y2="256" stroke="#dee2e6" stroke-width="1"/>
  <text x="30" y="240" fill="#212529" font-size="13">editor1</text>
  <text x="170" y="240" fill="#212529" font-size="13">John Editor</text>
  <!-- editor badge (teal) -->
  <rect x="322" y="230" width="48" height="18" fill="#0dcaf0" rx="4"/>
  <text x="346" y="243" fill="#212529" font-size="11" text-anchor="middle">editor</text>
  <text x="430" y="240" fill="#6c757d" font-size="12">—</text>
  <!-- Edit button -->
  <rect x="524" y="230" width="50" height="20" fill="#0d6efd" rx="4"/>
  <text x="549" y="244" fill="#ffffff" font-size="11" text-anchor="middle">✏ Edit</text>
  <!-- Password button -->
  <rect x="578" y="230" width="50" height="20" fill="#6c757d" rx="4"/>
  <text x="603" y="244" fill="#ffffff" font-size="11" text-anchor="middle">🔒 Pwd</text>
  <!-- Delete button -->
  <rect x="632" y="230" width="36" height="20" fill="#dc3545" rx="4"/>
  <text x="650" y="244" fill="#ffffff" font-size="11" text-anchor="middle">🗑</text>

  <!-- Row 3: viewer1 -->
  <rect x="16" y="256" width="660" height="40" fill="#ffffff"/>
  <line x1="16" y1="296" x2="676" y2="296" stroke="#dee2e6" stroke-width="1"/>
  <text x="30" y="280" fill="#212529" font-size="13">viewer1</text>
  <text x="170" y="280" fill="#212529" font-size="13">Jane Viewer</text>
  <!-- viewer badge (secondary) -->
  <rect x="322" y="270" width="48" height="18" fill="#6c757d" rx="4"/>
  <text x="346" y="283" fill="#ffffff" font-size="11" text-anchor="middle">viewer</text>
  <text x="430" y="280" fill="#6c757d" font-size="12">—</text>
  <!-- Edit button -->
  <rect x="524" y="270" width="50" height="20" fill="#0d6efd" rx="4"/>
  <text x="549" y="284" fill="#ffffff" font-size="11" text-anchor="middle">✏ Edit</text>
  <!-- Password button -->
  <rect x="578" y="270" width="50" height="20" fill="#6c757d" rx="4"/>
  <text x="603" y="284" fill="#ffffff" font-size="11" text-anchor="middle">🔒 Pwd</text>
  <!-- Delete button -->
  <rect x="632" y="270" width="36" height="20" fill="#dc3545" rx="4"/>
  <text x="650" y="284" fill="#ffffff" font-size="11" text-anchor="middle">🗑</text>

  <!-- ===== MODAL OVERLAY ===== -->
  <rect x="0" y="0" width="1200" height="800" fill="#000000" opacity="0.35"/>

  <!-- Modal card -->
  <rect x="700" y="100" width="480" height="420" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>

  <!-- Modal header -->
  <rect x="700" y="100" width="480" height="48" fill="#f8f9fa" rx="6"/>
  <rect x="700" y="124" width="480" height="24" fill="#f8f9fa"/>
  <line x1="700" y1="148" x2="1180" y2="148" stroke="#dee2e6" stroke-width="1"/>
  <text x="716" y="129" fill="#212529" font-size="14" font-weight="600">✏ Edit User — editor1</text>
  <text x="1172" y="129" fill="#6c757d" font-size="16" text-anchor="middle">×</text>

  <!-- Field: Display Name -->
  <text x="716" y="178" fill="#6c757d" font-size="12">Display Name</text>
  <rect x="716" y="186" width="348" height="28" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="728" y="204" fill="#212529" font-size="13">John Editor</text>

  <!-- Field: Role -->
  <text x="716" y="234" fill="#6c757d" font-size="12">Role</text>
  <rect x="716" y="242" width="200" height="28" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="728" y="260" fill="#212529" font-size="13">editor</text>
  <text x="904" y="260" fill="#6c757d" font-size="12">▾</text>

  <!-- Field: Groups -->
  <text x="716" y="290" fill="#6c757d" font-size="12">Groups</text>
  <rect x="716" y="298" width="348" height="60" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="728" y="316" fill="#6c757d" font-size="12" font-style="italic">No groups assigned</text>
  <text x="728" y="336" fill="#6c757d" font-size="11">Hold Ctrl / Cmd to select multiple</text>

  <!-- Password section -->
  <line x1="716" y1="378" x2="1064" y2="378" stroke="#dee2e6" stroke-width="1"/>
  <text x="716" y="398" fill="#6c757d" font-size="12">Password</text>
  <rect x="820" y="385" width="130" height="26" fill="#6c757d" rx="4"/>
  <text x="885" y="402" fill="#ffffff" font-size="12" text-anchor="middle">🔒 Reset Password</text>

  <!-- Modal footer -->
  <line x1="700" y1="470" x2="1180" y2="470" stroke="#dee2e6" stroke-width="1"/>
  <!-- Cancel button -->
  <rect x="972" y="482" width="72" height="28" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="1008" y="500" fill="#6c757d" font-size="13" text-anchor="middle">Cancel</text>
  <!-- Save button -->
  <rect x="1052" y="482" width="80" height="28" fill="#0d6efd" rx="4"/>
  <text x="1092" y="500" fill="#ffffff" font-size="13" text-anchor="middle">Save</text>

</svg>

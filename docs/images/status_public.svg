<!-- ServiceSentry UI Mockup — Public Status Page -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Body background -->
  <rect width="1200" height="700" fill="#f8f9fa"/>

  <!-- ===== STATUS BANNER (all green) ===== -->
  <rect width="1200" height="80" fill="#198754"/>

  <!-- Center text -->
  <text x="600" y="35" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">⚡ ServiceSentry</text>
  <text x="600" y="58" fill="#ffffff" font-size="14" text-anchor="middle" opacity="0.85">All systems operational</text>

  <!-- Right: auto-refresh label -->
  <text x="1100" y="42" fill="#ffffff" font-size="13" text-anchor="middle">Auto-refresh: 60s</text>

  <!-- ===== MODULE CARD 1: ping (collapsed, OK) ===== -->
  <rect x="16" y="96" width="1168" height="60" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <!-- Collapse arrow -->
  <text x="30" y="131" fill="#6c757d" font-size="14">▼</text>
  <!-- Module name + count -->
  <text x="52" y="131" fill="#212529" font-size="14" font-weight="600">📍 ping</text>
  <text x="118" y="131" fill="#6c757d" font-size="13">(2 checks)</text>
  <!-- Status badge: 2/2 OK -->
  <rect x="1060" y="118" width="72" height="22" fill="#198754" rx="4"/>
  <text x="1096" y="133" fill="#ffffff" font-size="12" text-anchor="middle">✅ 2/2 OK</text>

  <!-- ===== MODULE CARD 2: web (expanded, ERROR) ===== -->
  <rect x="16" y="172" width="1168" height="140" fill="#ffffff" stroke="#dee2e6" stroke-width="1" rx="6"/>

  <!-- Card header -->
  <rect x="16" y="172" width="1168" height="44" fill="#fff3f3" rx="6"/>
  <rect x="16" y="194" width="1168" height="22" fill="#fff3f3"/>
  <line x1="16" y1="216" x2="1184" y2="216" stroke="#dee2e6" stroke-width="1"/>
  <!-- Collapse arrow -->
  <text x="30" y="200" fill="#6c757d" font-size="14">▲</text>
  <!-- Module name + count -->
  <text x="52" y="200" fill="#212529" font-size="14" font-weight="600">🌐 web</text>
  <text x="108" y="200" fill="#6c757d" font-size="13">(1 check)</text>
  <!-- Status badge: 0/1 OK (error) -->
  <rect x="1060" y="187" width="72" height="22" fill="#dc3545" rx="4"/>
  <text x="1096" y="202" fill="#ffffff" font-size="12" text-anchor="middle">❌ 0/1 OK</text>

  <!-- Expanded content: table header -->
  <rect x="16" y="216" width="1168" height="30" fill="#f8f9fa"/>
  <line x1="16" y1="246" x2="1184" y2="246" stroke="#dee2e6" stroke-width="1"/>
  <text x="32" y="235" fill="#6c757d" font-size="12" font-weight="600">Host</text>
  <text x="600" y="235" fill="#6c757d" font-size="12" font-weight="600">Status</text>
  <text x="900" y="235" fill="#6c757d" font-size="12" font-weight="600">Last Check</text>

  <!-- Expanded content: data row -->
  <rect x="16" y="246" width="1168" height="40" fill="#ffffff"/>
  <line x1="16" y1="286" x2="1184" y2="286" stroke="#dee2e6" stroke-width="1"/>
  <text x="32" y="270" fill="#212529" font-size="13">www.example.com</text>
  <!-- Error badge -->
  <rect x="582" y="257" width="60" height="20" fill="#dc3545" rx="4"/>
  <text x="612" y="271" fill="#ffffff" font-size="12" text-anchor="middle">❌ 1 error</text>
  <text x="900" y="270" fill="#6c757d" font-size="12">hace 2 s</text>

  <!-- ===== BOTTOM NOTE ===== -->
  <text x="600" y="360" fill="#6c757d" font-size="11" text-anchor="middle" font-style="italic">Auto-refresco en 58 s · Última actualización: hace 2 s</text>

</svg>

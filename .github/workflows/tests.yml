name: Tests

on:
  push:
    tags: ["test"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: src/requirements.lock

      - name: Install dependencies
        run: |
          # Production: exact, hash-verified versions from the lock (its hashes put pip in
          # --require-hashes mode). Dev tooling goes on top WITHOUT the lock as a -c
          # constraint: a hashed constraints file would force --require-hashes onto the
          # (unhashed) dev requirements and fail. The lock is already installed, so the >=
          # ranges dev pulls in are satisfied and pip does not float production off it.
          pip install -r src/requirements.lock
          pip install -r src/requirements-dev.txt

      - name: Run tests
        working-directory: src
        # -n auto uses the pytest-xdist installed above (otherwise it is dead weight);
        # the suite is ~13 min parallel vs. much longer serial.
        run: pytest -m "not integration" -n auto

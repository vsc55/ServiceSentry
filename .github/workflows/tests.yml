name: Tests

on:
  push:
    tags: ["test"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install pytest pytest-xdist

      - name: Run tests
        working-directory: src
        # -n auto uses the pytest-xdist installed above (otherwise it is dead weight);
        # the suite is ~13 min parallel vs. much longer serial.
        run: pytest -m "not integration" -n auto
